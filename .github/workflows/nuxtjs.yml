name: Deploy Nuxt to GitHub Pages

on:
  # Executa o workflow toda vez que houver um push na branch main
  push:
    branches: ["main"] 
  # Permite rodar o workflow manualmente na aba Actions
  workflow_dispatch:

# Define as permissões necessárias para o GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Garante que apenas um deploy ocorra por vez
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    # Configura o ambiente do GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Usa a versão LTS mais recente do Node

      - name: Instalar dependências
        # O npm ci é melhor que o npm install para servidores, pois ele segue estritamente o package-lock.json
        run: npm ci

      - name: Gerar arquivos estáticos (Prerender)
        run: npm run generate
        # SE VOCÊ USA VARIÁVEIS DE AMBIENTE (.env), DESCOMENTE AS LINHAS ABAIXO E ADICIONE-AS AQUI:
        # env:
        #   NUXT_PUBLIC_API_URL: ${{ secrets.NUXT_PUBLIC_API_URL }}

      - name: Fazer upload dos artefatos
        uses: actions/upload-pages-artifact@v3
        with:
          # O Nuxt 3 salva os arquivos gerados nesta pasta
          path: .output/public

      - name: Fazer o Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
